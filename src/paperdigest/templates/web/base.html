<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}paperdigest{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #FAF9F6;
            --bg-card: #FFFFFF;
            --bg-card-hover: #FEFEFE;
            --text: #1C1917;
            --text-secondary: #57534E;
            --text-muted: #A8A29E;
            --accent: #9A3412;
            --accent-hover: #C2410C;
            --accent-subtle: #FFF7ED;
            --border: #E7E5E4;
            --border-light: #F5F5F4;
            --score-fill: #D97706;
            --success: #059669;
            --error: #DC2626;
            --shadow-sm: 0 1px 2px rgba(28, 25, 23, 0.04);
            --shadow-md: 0 4px 12px rgba(28, 25, 23, 0.06);
            --shadow-lg: 0 8px 24px rgba(28, 25, 23, 0.08);
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Source Serif 4', Georgia, serif;
            --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
        }

        html { font-size: 16px; -webkit-font-smoothing: antialiased; }

        body {
            font-family: var(--font-body);
            color: var(--text);
            background: var(--bg);
            line-height: 1.7;
            min-height: 100vh;
        }

        /* Subtle paper texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(251, 191, 36, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(154, 52, 18, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
        a:hover { color: var(--accent-hover); }

        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        .site-header {
            padding: 48px 0 0;
            margin-bottom: 48px;
        }

        .site-header .container {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .site-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        .site-title span {
            color: var(--text-muted);
            font-weight: 400;
            font-style: italic;
        }

        .header-nav a {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .header-nav a:hover { color: var(--accent); }

        /* Footer */
        .site-footer {
            margin-top: 80px;
            padding: 24px 0;
            border-top: 1px solid var(--border-light);
            text-align: center;
        }

        .site-footer p {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeInUp 0.5s ease-out both;
        }

        /* Utility */
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="/" class="site-title">paperdigest <span>/ {{ topic }}</span></a>
            <nav class="header-nav">
                <a href="/">Archive</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>paperdigest v0.1.0</p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>

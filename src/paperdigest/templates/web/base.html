<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}paperdigest{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #fafafa;
            --bg-card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #555;
            --text-muted: #999;
            --link: #0066cc;
            --link-hover: #0052a3;
            --border: #e5e5e5;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }

        html { font-size: 16px; }

        body {
            font-family: var(--font);
            color: var(--text);
            background: var(--bg);
            line-height: 1.6;
            min-height: 100vh;
        }

        a { color: var(--link); text-decoration: none; }
        a:hover { color: var(--link-hover); text-decoration: underline; }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .site-header {
            padding: 40px 0 0;
            margin-bottom: 40px;
        }

        .site-header .container {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .site-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text);
            text-decoration: none;
        }

        .site-title:hover { color: var(--text); text-decoration: none; }

        .site-title span {
            color: var(--text-muted);
            font-weight: 400;
        }

        .header-nav { display: flex; gap: 16px; }

        .header-nav a {
            font-size: 0.8125rem;
            color: var(--text-muted);
        }

        .header-nav a:hover { color: var(--link); }

        .site-footer {
            margin-top: 64px;
            padding: 20px 0;
            border-top: 1px solid var(--border);
        }

        .site-footer p {
            font-family: var(--font-mono);
            font-size: 0.6875rem;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="/" class="site-title">paperdigest <span>/ {{ topic }}</span></a>
            <nav class="header-nav">
                <a href="/">Archive</a>
                <a href="/papers">Papers</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>paperdigest</p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>

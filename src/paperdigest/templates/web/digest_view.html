{% extends "base.html" %}
{% block title %}Digest — {{ date }}{% endblock %}

{% block extra_css %}
<style>
    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        margin-bottom: 32px;
        transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent); }
    .back-link svg { width: 14px; height: 14px; }

    /* Digest content styling */
    .digest-content {
        animation: fadeInUp 0.45s ease-out both;
    }

    .digest-content h1 {
        font-family: var(--font-display);
        font-size: 2.2rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.2;
        margin-bottom: 8px;
        color: var(--text);
    }

    .digest-content h1 + p {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.04em;
        color: var(--text-muted);
        margin-bottom: 32px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--border);
    }

    .digest-content h2 {
        font-family: var(--font-display);
        font-size: 1.35rem;
        font-weight: 600;
        line-height: 1.3;
        margin-top: 8px;
        margin-bottom: 16px;
        color: var(--text);
        letter-spacing: -0.01em;
    }

    .digest-content h3 {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--accent);
        margin-top: 20px;
        margin-bottom: 12px;
    }

    .digest-content p {
        font-size: 0.92rem;
        line-height: 1.7;
        color: var(--text-secondary);
        margin-bottom: 10px;
    }

    .digest-content hr {
        border: none;
        height: 1px;
        background: var(--border);
        margin: 36px 0;
    }

    /* Metadata tables */
    .digest-content table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 16px;
        font-size: 0.84rem;
    }

    .digest-content thead { display: none; }

    .digest-content td,
    .digest-content th {
        padding: 5px 0;
        border: none;
        vertical-align: top;
        border-bottom: 1px solid var(--border-light);
    }

    .digest-content td:first-child {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.03em;
        color: var(--text-muted);
        width: 100px;
        padding-right: 16px;
        white-space: nowrap;
    }

    .digest-content td:last-child {
        color: var(--text-secondary);
    }

    .digest-content td a {
        border-bottom: 1px solid transparent;
        transition: border-color 0.2s;
    }

    .digest-content td a:hover {
        border-bottom-color: var(--accent);
    }

    /* Blockquotes (one-liner summaries) */
    .digest-content blockquote {
        border-left: 2px solid var(--accent);
        padding: 10px 0 10px 20px;
        margin: 16px 0;
        background: var(--accent-subtle);
    }

    .digest-content blockquote p {
        font-style: italic;
        color: var(--text);
        font-size: 0.95rem;
        margin: 0;
    }

    /* Links at bottom of each paper */
    .digest-content p a[href*="arxiv.org/pdf"],
    .digest-content p a[href*="pdf"] {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        display: inline-block;
        padding: 4px 12px;
        border: 1px solid var(--border);
        transition: all 0.2s;
    }

    .digest-content p a[href*="arxiv.org/pdf"]:hover,
    .digest-content p a[href*="pdf"]:hover {
        border-color: var(--accent);
        background: var(--accent-subtle);
    }

    /* Generated by footer */
    .digest-content > p:last-child em {
        font-family: var(--font-mono);
        font-size: 0.65rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-muted);
        font-style: normal;
    }
</style>
{% endblock %}

{% block content %}
<a href="/" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Back to archive
</a>

<article class="digest-content">
    {{ content | safe }}
</article>
{% endblock %}

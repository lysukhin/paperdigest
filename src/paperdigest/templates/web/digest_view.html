{% extends "base.html" %}
{% block title %}Digest #{{ number }}{% endblock %}

{% block extra_css %}
<style>
    .back-link {
        display: inline-block;
        font-size: 0.8125rem;
        color: var(--text-muted);
        margin-bottom: 24px;
    }

    .back-link:hover { color: var(--link); }

    .digest-content h1 {
        font-size: 1.5rem;
        font-weight: 700;
        line-height: 1.3;
        margin-bottom: 4px;
    }

    .digest-content h1 + p {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-bottom: 32px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border);
    }

    .digest-content h2 {
        font-size: 1.125rem;
        font-weight: 600;
        line-height: 1.4;
        margin-top: 8px;
        margin-bottom: 12px;
    }

    .digest-content h3 {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-secondary);
        margin-top: 16px;
        margin-bottom: 8px;
    }

    .digest-content p {
        font-size: 0.9375rem;
        line-height: 1.7;
        color: var(--text-secondary);
        margin-bottom: 8px;
    }

    .digest-content hr {
        border: none;
        height: 1px;
        background: var(--border);
        margin: 32px 0;
    }

    .digest-content table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 12px;
        font-size: 0.8125rem;
    }

    .digest-content thead { display: none; }

    .digest-content td {
        padding: 4px 0;
        border-bottom: 1px solid #f0f0f0;
        vertical-align: top;
    }

    .digest-content td:first-child {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        width: 100px;
        padding-right: 12px;
        white-space: nowrap;
    }

    .digest-content td:last-child {
        color: var(--text-secondary);
    }

    .digest-content blockquote {
        border-left: 2px solid var(--border);
        padding: 8px 0 8px 16px;
        margin: 12px 0;
    }

    .digest-content blockquote p {
        font-style: italic;
        color: var(--text);
        margin: 0;
    }

    .digest-content > p:last-child em {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        color: var(--text-muted);
        font-style: normal;
    }
</style>
{% endblock %}

{% block content %}
<a href="/" class="back-link">&larr; Back to archive</a>

<article class="digest-content">
    {{ content | safe }}
</article>
{% endblock %}
